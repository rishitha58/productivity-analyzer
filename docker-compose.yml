version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - REACT_APP_NLP_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/productivity
      - JWT_SECRET=your_jwt_secret_here
      - GROK_API_KEY=${GROK_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - NLP_SERVICE_URL=http://nlp-service:8000
    depends_on:
      - mongo
      - nlp-service
    volumes:
      - ./backend:/app
      - /app/node_modules

  nlp-service:
    build: ./nlp-service
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/productivity
    volumes:
      - ./nlp-service:/app

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: